<style>
    @font-face {
        font-family: GoogleSans;
        src: url('./fonts/GoogleSans-Medium.ttf');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
    }

    body {
        background: #121212;
        color: white;
        font-family: 'GoogleSans', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    .btn-retry {
        padding: 12px 24px;
        background: #FFB700;
        border: none;
        border-radius: 20px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
    }
    .icon-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px; /* Khoảng cách giữa 2 icon */
    margin-bottom: 30px;
}

.auth-icon {
    width: 120px; /* Giảm size xuống một chút để khi đặt cạnh nhau không bị quá to */
    height: auto;
}

.connector {
    font-size: 40px;
    color: #FFB700; /* Màu vàng giống nút bấm để tạo điểm nhấn */
    font-weight: bold;
}
</style>
<body>
    <div class="icon-container">
        <img src="./login_256dp_FFFFFF_FILL0_wght400_GRAD0_opsz48.svg" class="auth-icon">
        <span class="connector">→</span>
        <img src="./account_circle_256dp_FFFFFF_FILL0_wght400_GRAD0_opsz48.svg" class="auth-icon">
    </div>
    
    <h2 id="txt-title">Đăng nhập hoàn tất</h2>
    <p id="txt-desc1">Bạn có thể yên tâm đóng tab này.</p>
    <p id="txt-desc2" style="font-size: 0.9em; color: #888;">Nếu bạn không được chuyển hướng tự động, vui lòng nhấn vào nút bên dưới.</p>
    <button id="btn-open" class="btn-retry" onclick="requestOpenApp(code)">MỞ ỨNG DỤNG</button>
</body>

<script>
    // ==========================================
    // 1. TỪ ĐIỂN ĐA NGÔN NGỮ
    // ==========================================
    const translations = {
        vi: {
            title: "Đăng nhập hoàn tất",
            desc1: "Bạn có thể yên tâm đóng tab này.",
            desc2: "Nếu bạn không được chuyển hướng tự động, vui lòng nhấn vào nút bên dưới.",
            btn: "MỞ ỨNG DỤNG",
            error: "Lỗi: Không tìm thấy mã xác thực."
        },
        en: {
            title: "Login Successful",
            desc1: "You can safely close this tab.",
            desc2: "If you are not redirected automatically, please click the button below.",
            btn: "OPEN APP",
            error: "Error: Authentication code not found."
        }
    };

    // ==========================================
    // 2. PHÁT HIỆN NGÔN NGỮ TRÌNH DUYỆT VÀ ÁP DỤNG
    // ==========================================
    // Lấy ngôn ngữ của trình duyệt (VD: "vi-VN", "en-US")
    const browserLang = navigator.language; 
    
    // Nếu bắt đầu bằng 'vi' thì dùng tiếng Việt, còn lại mặc định là tiếng Anh
    const lang = browserLang.toLowerCase().startsWith('vi') ? 'vi' : 'en';

    // Đổi chữ trên màn hình
    document.getElementById("txt-title").innerText = translations[lang].title;
    document.getElementById("txt-desc1").innerText = translations[lang].desc1;
    document.getElementById("txt-desc2").innerText = translations[lang].desc2;
    document.getElementById("btn-open").innerText = translations[lang].btn;
    // Đổi tiêu đề của cả cái Tab trình duyệt
    document.title = translations[lang].title;

    // ==========================================
    // 3. LOGIC XỬ LÝ OAUTH (Giữ nguyên của bác)
    // ==========================================
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('code');
    
    const url = new URL(window.location.href);
    url.search = "";
    window.history.replaceState({}, document.title, url.pathname);

    function requestOpenApp(code) {
        window.location.href = "hieugllite://auth?code=" + code;
    }

    if (code) {
        requestOpenApp(code);
    } else {
        // Áp dụng luôn đa ngôn ngữ cho cả dòng báo lỗi
        document.body.innerHTML = `<h2 style='color: #ED4245;'>${translations[lang].error}</h2>`;
    }
</script>
</html>
